name: Scrape Tweets + Generate Signals + Refresh Backtest (Supabase)

on:
  schedule:
    # Intraday triggers to cover both EST and EDT
    - cron: '0 13 * * 1-5'
    - cron: '0 14 * * 1-5'
    - cron: '30 19 * * 1-5'
    - cron: '30 20 * * 1-5'

    # Midnight New York, covering both EST and EDT
    - cron: '0 4 * * *'
    - cron: '0 5 * * *'

  workflow_dispatch:

jobs:
  pipeline:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '0 14 * * 1-5' || github.event.schedule == '30 20 * * 1-5' || github.event.schedule == '0 13 * * 1-5' || github.event.schedule == '30 19 * * 1-5' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Gate pipeline to exact New York times
        id: gate_pipeline
        if: ${{ github.event_name == 'schedule' }}
        run: |
          NY_TIME=$(TZ=America/New_York date +'%H:%M')
          echo "New York time is $NY_TIME"
          if [ "$NY_TIME" = "09:00" ] || [ "$NY_TIME" = "15:30" ]; then
            echo "run_now=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_now=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: r-lib/actions/setup-r@v2
        if: ${{ github.event_name == 'workflow_dispatch' || steps.gate_pipeline.outputs.run_now == 'true' }}
        with:
          r-version: '4.3'

      - name: Install system deps
        if: ${{ github.event_name == 'workflow_dispatch' || steps.gate_pipeline.outputs.run_now == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libpq-dev libssl-dev \
            libcurl4-openssl-dev libxml2-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        if: ${{ github.event_name == 'workflow_dispatch' || steps.gate_pipeline.outputs.run_now == 'true' }}
        with:
          packages: |
            any::DBI
            any::RPostgres
            any::dplyr
            any::purrr
            any::tibble
            any::stringr
            any::lubridate
            any::tidyr
            any::glue
            any::jsonlite
            any::httr2
            any::tidyquant

      - name: Debug env presence
        if: ${{ github.event_name == 'workflow_dispatch' || steps.gate_pipeline.outputs.run_now == 'true' }}
        env:
          SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          X_BEARER: ${{ secrets.X_BEARER }}
        run: |
          echo "SUPABASE_POOLER_HOST set? $([ -n "$SUPABASE_POOLER_HOST" ] && echo yes || echo no)"
          echo "SUPABASE_USER set? $([ -n "$SUPABASE_USER" ] && echo yes || echo no)"
          echo "X_BEARER set? $([ -n "$X_BEARER" ] && echo yes || echo no)"

      - name: 1) Scrape + upsert tweets (twitter_ingest.R)
        if: ${{ github.event_name == 'workflow_dispatch' || steps.gate_pipeline.outputs.run_now == 'true' }}
        env:
          X_BEARER: ${{ secrets.X_BEARER }}
          TW_HANDLES: ${{ vars.TW_HANDLES }}
          LOCAL_TZ: America/New_York
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PWD: ${{ secrets.SUPABASE_PWD }}
          SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
        run: |
          Rscript twitter_ingest.R

      - name: 2) Generate + upsert signals (generate_tweet_signals.R)
        if: ${{ github.event_name == 'workflow_dispatch' || steps.gate_pipeline.outputs.run_now == 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LOCAL_TZ: America/New_York
          SIGNALS_LOOKBACK_MINUTES: ${{ vars.SIGNALS_LOOKBACK_MINUTES }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_TEMPERATURE: ${{ vars.OPENAI_TEMPERATURE }}
          OPENAI_MAX_TOKENS: ${{ vars.OPENAI_MAX_TOKENS }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PWD: ${{ secrets.SUPABASE_PWD }}
          SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
        run: |
          Rscript generate_tweet_signals.R

  refresh_backtest:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '0 5 * * *' || github.event.schedule == '0 4 * * *' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Gate refresh to exact New York midnight
        id: gate_refresh
        if: ${{ github.event_name == 'schedule' }}
        run: |
          NY_TIME=$(TZ=America/New_York date +'%H:%M')
          echo "New York time is $NY_TIME"
          if [ "$NY_TIME" = "00:00" ]; then
            echo "run_now=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_now=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: r-lib/actions/setup-r@v2
        if: ${{ github.event_name == 'workflow_dispatch' || steps.gate_refresh.outputs.run_now == 'true' }}
        with:
          r-version: '4.3'

      - name: Install system deps
        if: ${{ github.event_name == 'workflow_dispatch' || steps.gate_refresh.outputs.run_now == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libpq-dev libssl-dev \
            libcurl4-openssl-dev libxml2-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        if: ${{ github.event_name == 'workflow_dispatch' || steps.gate_refresh.outputs.run_now == 'true' }}
        with:
          packages: |
            any::DBI
            any::RPostgres
            any::dplyr
            any::purrr
            any::tibble
            any::stringr
            any::lubridate
            any::tidyr
            any::glue
            any::jsonlite
            any::zoo
            any::TTR

      - name: Debug env presence
        if: ${{ github.event_name == 'workflow_dispatch' || steps.gate_refresh.outputs.run_now == 'true' }}
        env:
          SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
        run: |
          echo "SUPABASE_POOLER_HOST set? $([ -n "$SUPABASE_POOLER_HOST" ] && echo yes || echo no)"
          echo "SUPABASE_USER set? $([ -n "$SUPABASE_USER" ] && echo yes || echo no)"

      - name: 3) Refresh incomplete + new backtest rows
        if: ${{ github.event_name == 'workflow_dispatch' || steps.gate_refresh.outputs.run_now == 'true' }}
        env:
          LOCAL_TZ: America/New_York
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PWD: ${{ secrets.SUPABASE_PWD }}
          SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
        run: |
          Rscript refresh_backtest_results.R
