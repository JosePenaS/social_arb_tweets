name: Scrape Tweets + Generate Signals (Supabase)

on:
  schedule:
    - cron: '0 14 * * 1-5'
    - cron: '30 20 * * 1-5'
    - cron: '0 13 * * 1-5'
    - cron: '30 19 * * 1-5'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libpq-dev libssl-dev \
            libcurl4-openssl-dev libxml2-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::DBI
            any::RPostgres
            any::dplyr
            any::purrr
            any::tibble
            any::stringr
            any::lubridate
            any::tidyr
            any::glue
            any::jsonlite
            any::httr2
            any::tidyquant

      - name: Debug env presence
        env:
          SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          X_BEARER: ${{ secrets.X_BEARER }}
        run: |
          echo "SUPABASE_POOLER_HOST set? $([ -n "$SUPABASE_POOLER_HOST" ] && echo yes || echo no)"
          echo "SUPABASE_USER set? $([ -n "$SUPABASE_USER" ] && echo yes || echo no)"
          echo "X_BEARER set? $([ -n "$X_BEARER" ] && echo yes || echo no)"

      - name: 1) Scrape + upsert tweets (twitter_ingest.R)
        env:
          X_BEARER: ${{ secrets.X_BEARER }}
          TW_HANDLES: ${{ vars.TW_HANDLES }}
          LOCAL_TZ: America/New_York
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PWD: ${{ secrets.SUPABASE_PWD }}
          SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
        run: |
          Rscript twitter_ingest.R

      - name: 2) Generate + upsert signals (generate_tweet_signals.R)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LOCAL_TZ: America/New_York
          SIGNALS_LOOKBACK_MINUTES: ${{ vars.SIGNALS_LOOKBACK_MINUTES }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_TEMPERATURE: ${{ vars.OPENAI_TEMPERATURE }}
          OPENAI_MAX_TOKENS: ${{ vars.OPENAI_MAX_TOKENS }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PWD: ${{ secrets.SUPABASE_PWD }}
          SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
        run: |
          Rscript generate_tweet_signals.R
