name: Scrape Tweets + Generate Signals + Refresh Backtest

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force rebuild all rows? Use true only when you intentionally want to recalculate everything."
        required: false
        default: "false"

      max_rows:
        description: "Max rows to process in backtest. Use Inf for all selected rows."
        required: false
        default: "Inf"

      max_feature_rows:
        description: "Max rows to process in feature refresh. Use Inf for all selected rows."
        required: false
        default: "Inf"

      as_of_date:
        description: "Optional AS_OF_DATE in YYYY-MM-DD. Leave blank to use current New York date."
        required: false
        default: ""

      new_signal_lookback_days:
        description: "Only process new signals from the last N days. Open trades are refreshed regardless of age."
        required: false
        default: "30"

      feature_lookback_days:
        description: "Refresh features for missing rows and signals from the last N days."
        required: false
        default: "30"

  schedule:
    # 9:00 AM New York during EST
    - cron: "0 14 * * 1-5"

    # 9:00 AM New York during EDT
    - cron: "0 13 * * 1-5"

    # 3:30 PM New York during EST
    - cron: "30 20 * * 1-5"

    # 3:30 PM New York during EDT
    - cron: "30 19 * * 1-5"

jobs:
  scrape-generate-refresh:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    env:
      # Supabase
      SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
      SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
      SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
      SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
      SUPABASE_PWD: ${{ secrets.SUPABASE_PWD }}

      # APIs
      X_BEARER: ${{ secrets.X_BEARER }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # Tables
      SIGNALS_TABLE: "twitter_trade_signals"
      FEATURES_TABLE: "twitter_trade_signal_features"

      # Original backtest target table
      BACKTEST_TABLE: "twitter_backtest_results_10_perc_strategy"

      # Gap-aware backtest target table
      GAPAWARE_BACKTEST_TABLE: "twitter_backtest_results_10_perc_strategy_gapaware"

      # Original strategy settings
      STRATEGY_LABEL: "tp10_sl5"
      TARGET_PCT: "0.10"
      STOP_PCT: "0.05"
      LOOKBACK_DAYS: "30"
      LOCKUP_DAYS: "30"
      SMA_LEN: "10"

      # Yahoo cache for backtest scripts
      CACHE_DIR: "cache_px_tp10_sl5"

      # Yahoo logs
      DEBUG_YAHOO: "true"

      # Production behavior:
      # false = only new recent signals + open/uncompleted trades
      # true = rerun every valid signal
      FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'false' }}

      # Only new signals within this window are processed by backtest.
      # Open/uncompleted trades are refreshed regardless of age.
      NEW_SIGNAL_LOOKBACK_DAYS: ${{ github.event.inputs.new_signal_lookback_days || '30' }}

      # Feature refresh:
      # processes rows missing features + recent signals within this window
      FEATURE_LOOKBACK_DAYS: ${{ github.event.inputs.feature_lookback_days || '30' }}
      MAX_FEATURE_ROWS: ${{ github.event.inputs.max_feature_rows || 'Inf' }}
      MAX_FEATURE_LAG_DAYS: "7"

      # Optional manual controls
      MAX_ROWS_LOCAL: ${{ github.event.inputs.max_rows || 'Inf' }}
      AS_OF_DATE: ${{ github.event.inputs.as_of_date || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug workflow timing
        run: |
          echo "Triggered by cron schedule: ${{ github.event.schedule }}"
          echo "UTC time:"
          date -u
          echo "Chile/Santiago time:"
          TZ=America/Santiago date
          echo "New York time:"
          TZ=America/New_York date

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3.3"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libpq-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            libxml2-dev \
            libgit2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::DBI
            any::RPostgres
            any::dplyr
            any::purrr
            any::tibble
            any::stringr
            any::lubridate
            any::jsonlite
            any::zoo
            any::TTR
            any::glue
            any::httr2
            any::tidyr
            any::readr
            any::tidyquant

      - name: Restore Yahoo price cache
        uses: actions/cache@v4
        with:
          path: cache_px_tp10_sl5
          key: yahoo-price-cache-tp10-sl5-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            yahoo-price-cache-tp10-sl5-${{ runner.os }}-

      - name: Scrape tweets
        continue-on-error: true
        run: |
          if [ -f "twitter_ingest.R" ]; then
            Rscript twitter_ingest.R
          else
            echo "twitter_ingest.R not found, skipping tweet scrape."
          fi

      - name: Generate trade signals
        run: |
          if [ -f "generate_tweet_signals.R" ]; then
            Rscript generate_tweet_signals.R
          else
            echo "generate_tweet_signals.R not found, skipping signal generation."
          fi

      - name: Refresh trade signal features
        run: |
          if [ -f "refresh_trade_signal_features.R" ]; then
            Rscript refresh_trade_signal_features.R
          else
            echo "refresh_trade_signal_features.R not found, skipping feature refresh."
          fi

      - name: Debug refresh file contents
        run: |
          echo "Checking original refresh_backtest_results.R..."
          if [ -f "refresh_backtest_results.R" ]; then
            echo "Checking for problematic Yahoo curl headers..."
            grep -n "application/json\|Accept:" refresh_backtest_results.R || true

            echo "Checking Yahoo fetch function definition..."
            grep -n "fetch_yahoo_chart_syscurl" refresh_backtest_results.R || true

            echo "Checking production selection logic..."
            grep -n "NEW_SIGNAL_LOOKBACK_DAYS\|new_recent_signals\|open_signals" refresh_backtest_results.R || true
          else
            echo "refresh_backtest_results.R not found."
          fi

          echo ""
          echo "Checking gap-aware refresh file..."
          if [ -f "refresh_backtest_results_gap_aware.R" ]; then
            echo "Checking gap-aware file banner..."
            grep -n "RUNNING FILE: refresh_backtest_results" refresh_backtest_results_gap_aware.R || true

            echo "Checking gap-aware target table variable..."
            grep -n "GAPAWARE_BACKTEST_TABLE\|TARGET_TABLE_NAME\|BACKTEST_TABLE\|twitter_backtest_results_10_perc_strategy_gapaware" refresh_backtest_results_gap_aware.R || true

            echo "Checking gap-aware exit types..."
            grep -n "gap_stop\|gap_target\|intraday_stop\|intraday_target" refresh_backtest_results_gap_aware.R || true
          else
            echo "refresh_backtest_results_gap_aware.R not found."
          fi

          echo ""
          echo "Checking feature refresh file..."
          if [ -f "refresh_trade_signal_features.R" ]; then
            grep -n "RUNNING FILE: refresh_trade_signal_features" refresh_trade_signal_features.R || true
          else
            echo "refresh_trade_signal_features.R not found."
          fi

      - name: Refresh original backtest results
        run: |
          if [ -f "refresh_backtest_results.R" ]; then
            Rscript refresh_backtest_results.R
          else
            echo "refresh_backtest_results.R not found, skipping original backtest refresh."
          fi

      - name: Refresh gap-aware backtest results
        env:
          BACKTEST_TABLE: "twitter_backtest_results_10_perc_strategy_gapaware"
          GAPAWARE_BACKTEST_TABLE: "twitter_backtest_results_10_perc_strategy_gapaware"
          STRATEGY_LABEL: "tp10_sl5_gapaware"
        run: |
          if [ -f "refresh_backtest_results_gap_aware.R" ]; then
            Rscript refresh_backtest_results_gap_aware.R
          else
            echo "refresh_backtest_results_gap_aware.R not found, skipping gap-aware backtest refresh."
          fi
