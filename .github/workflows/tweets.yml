name: Scrape Tweets + Generate Signals + Refresh Backtest

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force rebuild all rows? Use true only when you want to recalculate everything."
        required: false
        default: "false"
      max_rows:
        description: "Max rows to process. Use Inf for all missing rows."
        required: false
        default: "Inf"
      as_of_date:
        description: "Optional AS_OF_DATE in YYYY-MM-DD. Leave blank to use current New York date."
        required: false
        default: ""

  schedule:
    # Approx 9:00 AM New York during EST
    - cron: "0 14 * * 1-5"

    # Approx 9:00 AM New York during EDT
    - cron: "0 13 * * 1-5"

    # Approx 3:30 PM New York during EST
    - cron: "30 20 * * 1-5"

    # Approx 3:30 PM New York during EDT
    - cron: "30 19 * * 1-5"

jobs:
  scrape-generate-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      # Supabase
      SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
      SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
      SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
      SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
      SUPABASE_PWD: ${{ secrets.SUPABASE_PWD }}

      # APIs
      X_BEARER: ${{ secrets.X_BEARER }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # Backtest settings
      STRATEGY_LABEL: "tp10_sl5"
      SIGNALS_TABLE: "twitter_trade_signals"
      BACKTEST_TABLE: "twitter_backtest_results_10_perc_strategy"
      TARGET_PCT: "0.10"
      STOP_PCT: "0.05"
      LOOKBACK_DAYS: "30"
      LOCKUP_DAYS: "30"
      SMA_LEN: "10"
      CACHE_DIR: "cache_px_tp10_sl5"

      # Important: keep Yahoo debug off unless testing
      DEBUG_YAHOO: "false"

      # Default behavior: only process rows missing volatility_20d/open-needed refresh logic
      FORCE_REBUILD: ${{ github.event.inputs.force_rebuild || 'false' }}
      MAX_ROWS_LOCAL: ${{ github.event.inputs.max_rows || 'Inf' }}
      AS_OF_DATE: ${{ github.event.inputs.as_of_date || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libpq-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            libxml2-dev

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::DBI
            any::RPostgres
            any::dplyr
            any::purrr
            any::tibble
            any::stringr
            any::lubridate
            any::jsonlite
            any::zoo
            any::TTR
            any::glue
            any::httr2

      - name: Restore Yahoo price cache
        uses: actions/cache@v4
        with:
          path: cache_px_tp10_sl5
          key: yahoo-price-cache-tp10-sl5-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            yahoo-price-cache-tp10-sl5-${{ runner.os }}-

      - name: Scrape tweets
        run: |
          if [ -f "twitter_ingest.R" ]; then
            Rscript twitter_ingest.R
          else
            echo "twitter_ingest.R not found, skipping tweet scrape."
          fi

      - name: Generate trade signals
        run: |
          if [ -f "generate_tweet_signals.R" ]; then
            Rscript generate_tweet_signals.R
          else
            echo "generate_tweet_signals.R not found, skipping signal generation."
          fi

      - name: Refresh backtest results
        run: Rscript refresh_backtest_results.R
