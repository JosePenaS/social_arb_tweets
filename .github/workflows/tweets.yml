name: Scrape Tweets + Generate Signals + Refresh Backtest (Supabase)

on:
  schedule:
    # Intraday triggers, shifted away from busy GitHub minutes
    - cron: '7 13 * * 1-5'
    - cron: '7 14 * * 1-5'
    - cron: '37 19 * * 1-5'
    - cron: '37 20 * * 1-5'

    # Midnight-ish New York, covering both EST and EDT, shifted away from top of hour
    - cron: '7 4 * * *'
    - cron: '7 5 * * *'

  workflow_dispatch:

jobs:
  pipeline:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '7 14 * * 1-5' || github.event.schedule == '37 20 * * 1-5' || github.event.schedule == '7 13 * * 1-5' || github.event.schedule == '37 19 * * 1-5' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libpq-dev libssl-dev \
            libcurl4-openssl-dev libxml2-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::DBI
            any::RPostgres
            any::dplyr
            any::purrr
            any::tibble
            any::stringr
            any::lubridate
            any::tidyr
            any::glue
            any::jsonlite
            any::httr2
            any::tidyquant

      - name: Debug env presence
        env:
          SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          X_BEARER: ${{ secrets.X_BEARER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "SUPABASE_POOLER_HOST set? $([ -n "$SUPABASE_POOLER_HOST" ] && echo yes || echo no)"
          echo "SUPABASE_USER set? $([ -n "$SUPABASE_USER" ] && echo yes || echo no)"
          echo "X_BEARER set? $([ -n "$X_BEARER" ] && echo yes || echo no)"
          echo "OPENAI_API_KEY set? $([ -n "$OPENAI_API_KEY" ] && echo yes || echo no)"

      - name: 1) Scrape + upsert tweets
        env:
          X_BEARER: ${{ secrets.X_BEARER }}
          TW_HANDLES: ${{ vars.TW_HANDLES }}
          LOCAL_TZ: America/New_York
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PWD: ${{ secrets.SUPABASE_PWD }}
          SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
        run: |
          Rscript twitter_ingest.R

      - name: 2) Generate + upsert signals
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LOCAL_TZ: America/New_York
          SIGNALS_LOOKBACK_MINUTES: ${{ vars.SIGNALS_LOOKBACK_MINUTES }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_TEMPERATURE: ${{ vars.OPENAI_TEMPERATURE }}
          OPENAI_MAX_TOKENS: ${{ vars.OPENAI_MAX_TOKENS }}
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PWD: ${{ secrets.SUPABASE_PWD }}
          SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
        run: |
          Rscript generate_tweet_signals.R

  refresh_backtest:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.schedule == '7 5 * * *' || github.event.schedule == '7 4 * * *' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libpq-dev libssl-dev \
            libcurl4-openssl-dev libxml2-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::DBI
            any::RPostgres
            any::dplyr
            any::purrr
            any::tibble
            any::stringr
            any::lubridate
            any::tidyr
            any::glue
            any::jsonlite
            any::zoo
            any::TTR

      - name: Debug env presence
        env:
          SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PWD: ${{ secrets.SUPABASE_PWD }}
        run: |
          echo "SUPABASE_POOLER_HOST set? $([ -n "$SUPABASE_POOLER_HOST" ] && echo yes || echo no)"
          echo "SUPABASE_USER set? $([ -n "$SUPABASE_USER" ] && echo yes || echo no)"
          echo "SUPABASE_PWD set? $([ -n "$SUPABASE_PWD" ] && echo yes || echo no)"

      - name: 3) Refresh incomplete + new backtest rows
        env:
          LOCAL_TZ: America/New_York
          SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
          SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
          SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
          SUPABASE_PWD: ${{ secrets.SUPABASE_PWD }}
          SUPABASE_POOLER_HOST: ${{ secrets.SUPABASE_POOLER_HOST }}
        run: |
          Rscript refresh_backtest_results.R
